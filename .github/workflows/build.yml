name: Build APK from Web2APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: false
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      package_name:
        description: 'Package Name'
        required: true
        type: string
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      zip_url:
        description: 'ZIP URL (for Flutter projects)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Get Source
        run: |
          echo "Getting source..."
          if [ -n "${{ github.event.inputs.url }}" ]; then
            echo "URL: ${{ github.event.inputs.url }}"
          fi

      - name: Build WebView APK
        run: |
          echo "Creating Flutter project..."
          flutter create --org com.web2apk webview_app
          cd webview_app
          
          # HAPUS pubspec.yaml lama, BUAT BARU (hindari duplicate key)
          rm pubspec.yaml
          
          cat > pubspec.yaml << 'EOF'
          name: webview_app
          description: A WebView app
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.7.0

          dev_dependencies:
            flutter_test:
              sdk: flutter

          flutter:
            uses-material-design: true
          EOF
          
          flutter pub get
          
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(MyApp());

          class MyApp extends StatelessWidget {
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                home: WebViewPage(),
              );
            }
          }

          class WebViewPage extends StatefulWidget {
            @override
            State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> {
            late WebViewController controller;
            bool loading = true;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(NavigationDelegate(
                  onPageFinished: (url) => setState(() => loading = false),
                ))
                ..loadRequest(Uri.parse("${{ github.event.inputs.url }}"));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: Stack(
                    children: [
                      WebViewWidget(controller: controller),
                      if (loading)
                        Center(child: CircularProgressIndicator()),
                    ],
                  ),
                ),
              );
            }
          }
          EOF
          
          echo "Building APK..."
          flutter build apk --release
          cd ..

      - name: Find APK
        run: |
          APK=$(find . -name "*.apk" | head -1)
          if [ -f "$APK" ]; then
            cp "$APK" "${{ github.event.inputs.app_name }}.apk"
            echo "APK ready!"
          else
            echo "No APK found!"
            find . -name "*.apk"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}
          path: ${{ github.event.inputs.app_name }}.apk
          retention-days: 7
