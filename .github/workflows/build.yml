name: Build APK from Web2APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: false
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      package_name:
        description: 'Package Name'
        required: true
        type: string
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      zip_url:
        description: 'ZIP URL (for Flutter projects)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip
          
          # Download Android Command Line Tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d android-sdk
          mkdir -p android-sdk/cmdline-tools/latest
          mv android-sdk/cmdline-tools/* android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          
          # Accept licenses
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          
          # Install SDK
          sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Get Project Source
        id: get_source
        run: |
          if [ -n "${{ github.event.inputs.zip_url }}" ]; then
            echo "📦 Downloading ZIP from: ${{ github.event.inputs.zip_url }}"
            wget -q -O project.zip "${{ github.event.inputs.zip_url }}" || {
              echo "❌ Failed to download ZIP"
              exit 1
            }
            unzip -q -o project.zip -d project/ 2>/dev/null || mkdir -p project
          elif [ -n "${{ github.event.inputs.url }}" ]; then
            echo "🌐 Using website URL: ${{ github.event.inputs.url }}"
            mkdir -p project
            echo "${{ github.event.inputs.url }}" > project/url.txt
          else
            echo "❌ No source provided!"
            exit 1
          fi
          
          echo "✅ Source ready"
          ls -la project/ 2>/dev/null || echo "Project folder empty"

      - name: Build WebView APK
        run: |
          echo "🔨 Building WebView APK..."
          
          # Buat project Flutter baru
          flutter create --org com.web2apk --project-name webview_app webview_app
          cd webview_app
          
          # Tambah dependency webview
          cat >> pubspec.yaml << 'EOF'
          
            webview_flutter: ^4.8.0
            webview_flutter_android: ^3.16.0
          EOF
          
          flutter pub get
          
          # Buat main.dart dengan WebView
          cat > lib/main.dart << 'MAINEOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:webview_flutter_android/webview_flutter_android.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'APP_NAME_PLACEHOLDER',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  primarySwatch: Colors.blue,
                  useMaterial3: true,
                ),
                home: const WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
            bool isLoading = true;

            @override
            void initState() {
              super.initState();
              
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageStarted: (url) => setState(() => isLoading = true),
                    onPageFinished: (url) => setState(() => isLoading = false),
                    onWebResourceError: (error) => print('Web error: ${error.description}'),
                  ),
                )
                ..loadRequest(Uri.parse('URL_PLACEHOLDER'));
              
              // Enable Android debugging
              if (controller.platform is AndroidWebViewController) {
                AndroidWebViewController.enableDebugging(true);
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: Stack(
                    children: [
                      WebViewWidget(controller: controller),
                      if (isLoading)
                        const Center(
                          child: CircularProgressIndicator(),
                        ),
                    ],
                  ),
                ),
              );
            }
          }
          MAINEOF
          
          # Ganti placeholder
          sed -i "s/APP_NAME_PLACEHOLDER/${{ github.event.inputs.app_name }}/g" lib/main.dart
          sed -i "s|URL_PLACEHOLDER|${{ github.event.inputs.url }}|g" lib/main.dart
          
          echo "✅ Main.dart ready"
          
          # Build APK
          echo "🔨 Building APK..."
          flutter build apk --release --target-platform android-arm64,android-arm
          
          cd ..

      - name: Find and Prepare APK
        run: |
          echo "🔍 Mencari APK..."
          
          # Cari semua APK
          find . -name "*.apk" -type f -ls
          
          # Cari APK release
          APK_PATH=$(find . -path "*/release/*.apk" -o -name "app-release.apk" | head -1)
          
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*.apk" -type f | head -1)
          fi
          
          if [ -n "$APK_PATH" ]; then
            echo "✅ APK ditemukan: $APK_PATH"
            cp "$APK_PATH" "${{ github.event.inputs.app_name }}.apk"
            ls -lh "${{ github.event.inputs.app_name }}.apk"
            echo "✅ APK size: $(du -h ${{ github.event.inputs.app_name }}.apk | cut -f1)"
          else
            echo "❌ APK tidak ditemukan!"
            echo "Isi folder:"
            find . -type d -maxdepth 4
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}
          path: ${{ github.event.inputs.app_name }}.apk
          retention-days: 7
          if-no-files-found: error

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Build sukses!"
          echo "APK: ${{ github.event.inputs.app_name }}.apk"

      - name: Notify Failed
        if: failure()
        run: |
          echo "❌ Build gagal!"
          echo "Cek log di atas untuk detail error"
