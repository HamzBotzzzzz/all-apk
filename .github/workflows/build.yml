name: Build APK from Web2APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: false
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      package_name:
        description: 'Package Name'
        required: true
        type: string
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      zip_url:
        description: 'ZIP URL (for Flutter projects)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0

      - name: Get Project Source
        id: get_source
        run: |
          if [ -n "${{ github.event.inputs.zip_url }}" ]; then
            echo "📦 Downloading ZIP from: ${{ github.event.inputs.zip_url }}"
            wget -q -O project.zip "${{ github.event.inputs.zip_url }}" || echo "ZIP download failed"
            if [ -f project.zip ]; then
              unzip -q -o project.zip -d project/
              rm project.zip
            fi
          fi
          
          if [ -n "${{ github.event.inputs.url }}" ]; then
            echo "🌐 Website URL: ${{ github.event.inputs.url }}"
            mkdir -p project
            echo "${{ github.event.inputs.url }}" > project/url.txt
          fi
          
          echo "✅ Source ready"

      - name: Check if Flutter Project
        id: check_flutter
        run: |
          if [ -f "project/pubspec.yaml" ]; then
            echo "✅ Flutter project detected"
            echo "is_flutter=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Not a Flutter project"
            echo "is_flutter=false" >> $GITHUB_OUTPUT
          fi

      - name: Build WebView APK (Non-Flutter)
        if: steps.check_flutter.outputs.is_flutter == 'false'
        run: |
          echo "🔨 Creating Flutter WebView project..."
          
          flutter create --org com.web2apk --project-name webview_app webview_app
          cd webview_app
          
          # Overwrite pubspec.yaml (biar gak duplicate key)
          cat > pubspec.yaml << 'PUBEOF'
          name: webview_app
          description: "Web2APK Generated App"
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.2.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.7.0
            webview_flutter_android: ^3.12.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          PUBEOF
          
          flutter pub get
          
          # Buat main.dart
          cat > lib/main.dart << 'DARTEOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:webview_flutter_android/webview_flutter_android.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatefulWidget {
            const MyApp({super.key});
            @override
            State<MyApp> createState() => _MyAppState();
          }

          class _MyAppState extends State<MyApp> {
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                home: const WebViewApp(),
              );
            }
          }

          class WebViewApp extends StatefulWidget {
            const WebViewApp({super.key});
            @override
            State<WebViewApp> createState() => _WebViewAppState();
          }

          class _WebViewAppState extends State<WebViewApp> {
            late final WebViewController controller;
            bool loading = true;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(NavigationDelegate(
                  onPageFinished: (_) => setState(() => loading = false),
                ))
                ..loadRequest(Uri.parse("${{ github.event.inputs.url }}"));
              
              if (controller.platform is AndroidWebViewController) {
                AndroidWebViewController.enableDebugging(true);
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: Stack(
                    children: [
                      WebViewWidget(controller: controller),
                      if (loading)
                        const Center(child: CircularProgressIndicator()),
                    ],
                  ),
                ),
              );
            }
          }
          DARTEOF
          
          echo "🔨 Building APK..."
          flutter build apk --release
          
          echo "✅ WebView APK build complete!"
          cd ..

      - name: Build Flutter Project
        if: steps.check_flutter.outputs.is_flutter == 'true'
        run: |
          echo "🔨 Building Flutter project..."
          cd project
          flutter pub get
          flutter build apk --release
          echo "✅ Flutter APK build complete!"
          cd ..

      - name: Find and Rename APK
        run: |
          echo "🔍 Searching for APK..."
          
          # Cari APK di semua folder
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          
          if [ -n "$APK_PATH" ]; then
            echo "✅ APK found: $APK_PATH"
            cp "$APK_PATH" "${{ github.event.inputs.app_name }}.apk"
            echo "📦 APK size: $(du -h ${{ github.event.inputs.app_name }}.apk | cut -f1)"
          else
            echo "❌ No APK found!"
            echo "Listing all files:"
            find . -type f -name "*.apk" 2>/dev/null
            echo ""
            echo "Build folders:"
            find . -type d -name "build" 2>/dev/null
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}
          path: ${{ github.event.inputs.app_name }}.apk
          retention-days: 7
          if-no-files-found: error

      - name: Build Success
        if: success()
        run: |
          echo "🎉 BUILD SUCCESS!"
          echo "APK: ${{ github.event.inputs.app_name }}.apk"

      - name: Build Failed
        if: failure()
        run: |
          echo "💀 BUILD FAILED!"
          echo "Check logs above for errors"
