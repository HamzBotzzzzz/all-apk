name: Build APK from Web2APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: false
        type: string
      app_name:
        description: 'App Name (will be displayed on phone)'
        required: true
        type: string
      package_name:
        description: 'Package Name (com.example.app)'
        required: true
        type: string
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      zip_url:
        description: 'ZIP URL (for Flutter projects)'
        required: false
        type: string
      icon_url:
        description: 'Icon URL (512x512 PNG, optional)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Download Custom Icon
        run: |
          if [ -n "${{ github.event.inputs.icon_url }}" ]; then
            echo "📥 Downloading custom icon..."
            wget -q -O icon.png "${{ github.event.inputs.icon_url }}" || echo "Icon download failed"
            if [ -f icon.png ]; then
              echo "✅ Custom icon downloaded: $(file icon.png)"
            fi
          else
            echo "ℹ️ No custom icon, using default"
          fi

      - name: Build WebView APK
        run: |
          echo "🔨 Creating Flutter project..."
          
          # Buat project dengan nama app yang diinginkan
          PROJECT_NAME=$(echo "${{ github.event.inputs.app_name }}" | sed 's/[^a-zA-Z0-9]//g')
          flutter create --org com.web2apk --project-name $PROJECT_NAME tmp_app
          cd tmp_app
          
          # Overwrite pubspec.yaml
          cat > pubspec.yaml << 'PUBEOF'
          name: APP_NAME_PLACEHOLDER
          description: "Generated by Web2APK"
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.7.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_launcher_icons: ^0.13.1

          flutter:
            uses-material-design: true
          
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon.png"
            adaptive_icon_background: "#2196F3"
            adaptive_icon_foreground: "assets/icon.png"
          PUBEOF
          
          # Replace app name di pubspec.yaml
          sed -i "s/APP_NAME_PLACEHOLDER/$PROJECT_NAME/g" pubspec.yaml
          
          # Buat folder assets
          mkdir -p assets
          
          # Copy icon
          if [ -f ../icon.png ]; then
            cp ../icon.png assets/icon.png
            echo "✅ Custom icon copied to assets/"
          else
            # Buat default icon (biru dengan text)
            cat > create_icon.dart << 'DARTEOF'
            import 'dart:io';
            import 'dart:typed_data';
            
            void main() {
              // Create simple PNG placeholder (1x1 blue pixel)
              final bytes = [
                0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A, // PNG signature
                0x00, 0x00, 0x00, 0x0D, 0x49, 0x48, 0x44, 0x52, // IHDR
                0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01, // 1x1
                0x08, 0x02, 0x00, 0x00, 0x00, 0x90, 0x77, 0x53,
                0xDE, 0x00, 0x00, 0x00, 0x0C, 0x49, 0x44, 0x41, // IDAT
                0x54, 0x08, 0xD7, 0x63, 0x60, 0x60, 0x60, 0x00,
                0x00, 0x00, 0x04, 0x00, 0x01, 0x27, 0x34, 0x0A,
                0x4E, 0x00, 0x00, 0x00, 0x00, 0x49, 0x45, 0x4E, // IEND
                0x44, 0xAE, 0x42, 0x60, 0x82
              ];
              File('assets/icon.png').writeAsBytesSync(bytes);
            }
            DARTEOF
            dart create_icon.dart
            echo "ℹ️ Default icon created"
          fi
          
          # Update AndroidManifest.xml - APP NAME
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFESTEOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="PACKAGE_PLACEHOLDER">
              
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              
              <application
                  android:label="APP_NAME_PLACEHOLDER"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>
          </manifest>
          MANIFESTEOF
          
          # Replace placeholders
          PACKAGE="${{ github.event.inputs.package_name }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          sed -i "s|PACKAGE_PLACEHOLDER|$PACKAGE|g" android/app/src/main/AndroidManifest.xml
          sed -i "s|APP_NAME_PLACEHOLDER|$APP_NAME|g" android/app/src/main/AndroidManifest.xml
          
          # Update build.gradle applicationId
          sed -i "s|applicationId \".*\"|applicationId \"$PACKAGE\"|g" android/app/build.gradle
          
          flutter pub get
          
          # Generate custom icons
          if [ -f assets/icon.png ] && [ -s assets/icon.png ]; then
            dart run flutter_launcher_icons
          fi
          
          # Buat main.dart
          cat > lib/main.dart << 'DARTEOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(WebApp());

          class WebApp extends StatelessWidget {
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'APP_TITLE_HERE',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  primarySwatch: Colors.blue,
                  useMaterial3: true,
                ),
                home: WebViewPage(),
              );
            }
          }

          class WebViewPage extends StatefulWidget {
            @override
            State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> {
            late WebViewController controller;
            bool loading = true;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(NavigationDelegate(
                  onPageFinished: (url) => setState(() => loading = false),
                ))
                ..loadRequest(Uri.parse("URL_HERE"));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: Stack(
                    children: [
                      WebViewWidget(controller: controller),
                      if (loading)
                        Center(child: CircularProgressIndicator()),
                    ],
                  ),
                ),
              );
            }
          }
          DARTEOF
          
          # Replace URL & Title
          sed -i "s|URL_HERE|${{ github.event.inputs.url }}|g" lib/main.dart
          sed -i "s|APP_TITLE_HERE|$APP_NAME|g" lib/main.dart
          
          echo "🔨 Building APK..."
          flutter build apk --release
          
          echo "✅ Build complete!"
          cd ..

      - name: Find and Rename APK
        run: |
          echo "🔍 Collecting APK..."
          
          APK=$(find . -name "*.apk" -type f | head -1)
          
          if [ -f "$APK" ]; then
            FINAL_NAME="${{ github.event.inputs.app_name }}.apk"
            cp "$APK" "$FINAL_NAME"
            SIZE=$(du -h "$FINAL_NAME" | cut -f1)
            echo "✅ APK: $FINAL_NAME ($SIZE)"
            ls -la "$FINAL_NAME"
          else
            echo "❌ No APK found!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}
          path: "${{ github.event.inputs.app_name }}.apk"
          retention-days: 7
