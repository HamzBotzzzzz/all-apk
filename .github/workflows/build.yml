name: Build APK from Web2APK

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: false
        type: string
      app_name:
        description: 'App Name'
        required: true
        type: string
      package_name:
        description: 'Package Name'
        required: true
        type: string
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      zip_url:
        description: 'ZIP URL'
        required: false
        type: string
      icon_url:
        description: 'Icon URL (512x512 PNG)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Download Custom Icon
        run: |
          if [ -n "${{ github.event.inputs.icon_url }}" ]; then
            echo "Downloading icon..."
            wget -q -O icon.png "${{ github.event.inputs.icon_url }}" || echo "Icon download failed"
          fi

      - name: Create Flutter Project
        run: |
          flutter create --org com.web2apk tmp_app
          cd tmp_app
          mkdir -p assets
          if [ -f ../icon.png ]; then
            cp ../icon.png assets/icon.png
          fi

      - name: Setup pubspec.yaml
        run: |
          cd tmp_app
          rm pubspec.yaml
          
          echo 'name: tmp_app' >> pubspec.yaml
          echo 'description: "Generated by Web2APK - ilhamm"' >> pubspec.yaml
          echo 'publish_to: none' >> pubspec.yaml
          echo 'version: 1.0.0+1' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'environment:' >> pubspec.yaml
          echo '  sdk: ">=3.0.0 <4.0.0"' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'dependencies:' >> pubspec.yaml
          echo '  flutter:' >> pubspec.yaml
          echo '    sdk: flutter' >> pubspec.yaml
          echo '  webview_flutter: ^4.7.0' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'dev_dependencies:' >> pubspec.yaml
          echo '  flutter_test:' >> pubspec.yaml
          echo '    sdk: flutter' >> pubspec.yaml
          echo '  flutter_launcher_icons: ^0.13.1' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'flutter:' >> pubspec.yaml
          echo '  uses-material-design: true' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'flutter_launcher_icons:' >> pubspec.yaml
          echo '  android: true' >> pubspec.yaml
          echo '  ios: false' >> pubspec.yaml
          echo '  image_path: "assets/icon.png"' >> pubspec.yaml
          
          flutter pub get

      - name: Create main.dart
        run: |
          cd tmp_app
          rm lib/main.dart
          
          echo "import 'package:flutter/material.dart';" >> lib/main.dart
          echo "import 'package:webview_flutter/webview_flutter.dart';" >> lib/main.dart
          echo "" >> lib/main.dart
          echo "void main() => runApp(WebApp());" >> lib/main.dart
          echo "" >> lib/main.dart
          echo "class WebApp extends StatelessWidget {" >> lib/main.dart
          echo "  @override" >> lib/main.dart
          echo "  Widget build(BuildContext context) {" >> lib/main.dart
          echo "    return MaterialApp(" >> lib/main.dart
          echo "      title: '${{ github.event.inputs.app_name }}'," >> lib/main.dart
          echo "      debugShowCheckedModeBanner: false," >> lib/main.dart
          echo "      home: WebViewPage()," >> lib/main.dart
          echo "    );" >> lib/main.dart
          echo "  }" >> lib/main.dart
          echo "}" >> lib/main.dart
          echo "" >> lib/main.dart
          echo "class WebViewPage extends StatefulWidget {" >> lib/main.dart
          echo "  @override" >> lib/main.dart
          echo "  State<WebViewPage> createState() => _WebViewPageState();" >> lib/main.dart
          echo "}" >> lib/main.dart
          echo "" >> lib/main.dart
          echo "class _WebViewPageState extends State<WebViewPage> {" >> lib/main.dart
          echo "  late WebViewController controller;" >> lib/main.dart
          echo "  bool loading = true;" >> lib/main.dart
          echo "" >> lib/main.dart
          echo "  @override" >> lib/main.dart
          echo "  void initState() {" >> lib/main.dart
          echo "    super.initState();" >> lib/main.dart
          echo "    controller = WebViewController()" >> lib/main.dart
          echo "      ..setJavaScriptMode(JavaScriptMode.unrestricted)" >> lib/main.dart
          echo "      ..setNavigationDelegate(NavigationDelegate(" >> lib/main.dart
          echo "        onPageFinished: (url) => setState(() => loading = false)," >> lib/main.dart
          echo "      ))" >> lib/main.dart
          echo "      ..loadRequest(Uri.parse('${{ github.event.inputs.url }}'));" >> lib/main.dart
          echo "  }" >> lib/main.dart
          echo "" >> lib/main.dart
          echo "  @override" >> lib/main.dart
          echo "  Widget build(BuildContext context) {" >> lib/main.dart
          echo "    return Scaffold(" >> lib/main.dart
          echo "      body: SafeArea(" >> lib/main.dart
          echo "        child: Stack(" >> lib/main.dart
          echo "          children: [" >> lib/main.dart
          echo "            WebViewWidget(controller: controller)," >> lib/main.dart
          echo "            if (loading)" >> lib/main.dart
          echo "              Center(child: CircularProgressIndicator())," >> lib/main.dart
          echo "          ]," >> lib/main.dart
          echo "        )," >> lib/main.dart
          echo "      )," >> lib/main.dart
          echo "    );" >> lib/main.dart
          echo "  }" >> lib/main.dart
          echo "}" >> lib/main.dart

      - name: Update Android Config
        run: |
          cd tmp_app
          
          PACKAGE="${{ github.event.inputs.package_name }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          
          # Update AndroidManifest.xml
          cat > android/app/src/main/AndroidManifest.xml << MANIFESTEND
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="${PACKAGE}">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application
                  android:label="${APP_NAME}"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>
          </manifest>
          MANIFESTEND
          
          # Update build.gradle
          sed -i "s|applicationId .*|applicationId \"${PACKAGE}\"|g" android/app/build.gradle

      - name: Generate Icons
        run: |
          cd tmp_app
          if [ -f assets/icon.png ] && [ -s assets/icon.png ]; then
            echo "Generating custom icons..."
            dart run flutter_launcher_icons || echo "Icon generation skipped"
          else
            echo "No custom icon, using default"
          fi

      - name: Build APK
        run: |
          cd tmp_app
          echo "Building APK..."
          flutter build apk --release
          echo "Build complete!"

      - name: Collect APK
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          if [ -f "$APK" ]; then
            cp "$APK" "${{ github.event.inputs.app_name }}.apk"
            echo "APK ready: ${{ github.event.inputs.app_name }}.apk"
            ls -lh "${{ github.event.inputs.app_name }}.apk"
          else
            echo "No APK found!"
            find . -name "*.apk"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}
          path: "${{ github.event.inputs.app_name }}.apk"
          retention-days: 7
